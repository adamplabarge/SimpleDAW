name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SimpleDAW.csproj

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = "0.0.0-dev"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish app
        run: dotnet publish SimpleDAW.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.VERSION }} -o installer/publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.VERSION }}" "installer/SimpleDAW.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleDAW-installer-${{ steps.version.outputs.VERSION }}
          path: installer/output/*.exe

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SimpleDAW ${{ github.ref_name }}
          generate_release_notes: true
          files: installer/output/*.exe

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleDAW-publish
          path: installer/publish/**
